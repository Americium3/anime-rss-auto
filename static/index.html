<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0c11" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#eef1f7" media="(prefers-color-scheme: light)">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%238b5cf6"/><stop offset="1" stop-color="%2322d3ee"/></linearGradient></defs><rect x="2" y="2" width="60" height="60" rx="16" fill="url(%23g)"/><g fill="none" stroke="%23fff" stroke-width="6.5" stroke-linecap="round"><path d="M17 32 A15 15 0 0 1 32 47"/><path d="M17 20 A27 27 0 0 1 44 47"/></g><path d="M13.5 41.5 L24 47 L13.5 52.5 Z" fill="%23fff" stroke="%23fff" stroke-width="4" stroke-linejoin="round"/></svg>'>
<title>Anime Autopilot</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0c11;
    --panel: rgba(255,255,255,.035);
    --panel-border: rgba(255,255,255,.08);
    --text: #e7eaf0;
    --text-dim: #8b93a3;
    --text-faint: #7d8698;
    --accent-a: #8b5cf6;
    --accent-b: #22d3ee;
    --ok: #34d399;
    --warn: #fbbf24;
    --muted: #64748b;
    --media-bg: #141821;
    --input-bg: #12151d;
    --log-bg: #0d1017;
    --log-text: #9aa5b8;
    --toast-bg: #161a24;
    --btn-text: #0b0d12;
    --hover-border: rgba(255,255,255,.16);
    --scroll-thumb: rgba(255,255,255,.16);
    --glow-a: rgba(139,92,246,.14);
    --glow-b: rgba(34,211,238,.10);
    --mono: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --radius: 18px;
  }
  html[data-theme="light"] {
    color-scheme: light;
    --bg: #eef1f7;
    --panel: rgba(255,255,255,.65);
    --panel-border: rgba(13,23,40,.10);
    --text: #16202e;
    --text-dim: #526074;
    --text-faint: #5d6b80;
    --accent-a: #7c3aed;
    --accent-b: #0891b2;
    --ok: #059669;
    --warn: #b45309;
    --media-bg: #dfe5ee;
    --input-bg: #ffffff;
    --log-bg: #e9edf4;
    --log-text: #45536a;
    --toast-bg: #ffffff;
    --btn-text: #ffffff;
    --hover-border: rgba(13,23,40,.25);
    --scroll-thumb: rgba(13,23,40,.22);
    --glow-a: rgba(124,58,237,.10);
    --glow-b: rgba(8,145,178,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      radial-gradient(900px 500px at 85% -10%, var(--glow-a), transparent 60%),
      radial-gradient(700px 400px at -5% 15%, var(--glow-b), transparent 60%);
    background-attachment: fixed;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }
  :focus-visible { outline: 2px solid var(--accent-b); outline-offset: 2px; }
  .sr-only {
    position: absolute; width: 1px; height: 1px; margin: -1px;
    clip-path: inset(50%); overflow: hidden; white-space: nowrap;
  }

  /* ---------- header ---------- */
  header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 26px; }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-right: auto; }
  .brand .logo {
    width: 26px; height: 26px; flex: none; align-self: center;
    filter: drop-shadow(0 0 10px color-mix(in srgb, var(--accent-a) 55%, transparent));
  }
  .brand h1 { font-size: 19px; font-weight: 650; letter-spacing: .12em; margin: 0; }
  .brand small { color: var(--text-faint); letter-spacing: .05em; font-size: 11.5px; }
  .chip {
    padding: 5px 12px; border-radius: 999px; font-size: 12px;
    border: 1px solid var(--panel-border); background: var(--panel); color: var(--text-dim);
    white-space: nowrap;
  }
  .chip b { color: var(--text); font-weight: 600; }
  .chip.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 35%, transparent); }
  .btn {
    appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
    color: var(--btn-text); padding: 8px 18px; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
    box-shadow: 0 4px 18px color-mix(in srgb, var(--accent-a) 35%, transparent);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px color-mix(in srgb, var(--accent-a) 50%, transparent); }
  .btn:disabled { opacity: .55; cursor: default; transform: none; }
  .btn.ghost {
    background: var(--panel); color: var(--text-dim);
    border: 1px solid var(--panel-border); box-shadow: none; font-weight: 500;
  }
  .btn.ghost:hover { color: var(--text); }
  .btn.small { padding: 5px 12px; font-size: 12px; }
  .btn.compact { padding: 6px 13px; font-size: 12px; min-width: 46px; }

  /* ---------- show cards ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(340px, 100%), 1fr)); gap: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(8px);
    display: flex; cursor: pointer;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .card:hover {
    border-color: color-mix(in srgb, var(--card-glow, var(--text-dim)) 60%, transparent);
    box-shadow: 0 0 20px color-mix(in srgb, var(--card-glow, var(--text-dim)) 25%, transparent);
    transform: translateY(-2px);
  }
  .card:active, .sched-item:active, .premiere:active { transform: scale(.99); }
  /* Hover glow tinted by the show's bgm collection type (cards + timetable). */
  .t-watching { --card-glow: var(--ok); }
  .t-want { --card-glow: var(--accent-b); }
  .t-done { --card-glow: var(--text-dim); }
  .t-onhold { --card-glow: var(--warn); }
  .t-dropped { --card-glow: #f87171; }
  html[data-theme="light"] .t-dropped { --card-glow: #dc2626; }
  .cover { width: 112px; min-width: 112px; background: var(--media-bg); position: relative; }
  .cover img, .pcover img, .scover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover .ph, .pcover .ph, .scover .ph {
    position: absolute; inset: 0; display: grid; place-items: center; color: var(--text-faint);
  }
  .cover .ph { font-size: 24px; }
  .card-body { padding: 14px 16px; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .card h3 { margin: 0; font-size: 15px; font-weight: 640; line-height: 1.3; }
  .card h3 a, .stitle a, .ptitle a { color: inherit; text-decoration: none; }
  .jp { color: var(--text-faint); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    padding: 3px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px;
    background: color-mix(in srgb, currentColor 12%, transparent);
  }
  .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.grace { color: var(--warn); }
  .pill.unresolved { color: var(--text-dim); }
  .pill.unresolved::before { animation: pulse 1.6s ease-in-out infinite; }
  .pill.manual { color: var(--muted); }
  .pill.watching { color: var(--ok); }
  .pill.want { color: var(--accent-b); }
  @keyframes pulse { 50% { opacity: .25; } }
  /* Season badge: 8 colors = 4 cours × 2 years, same cour same color,
     palette repeats every two years. */
  .season-tag {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    padding: 2px 9px; border-radius: 999px; color: var(--text-faint);
    background: color-mix(in srgb, currentColor 12%, transparent);
  }
  .season-tag.s0, .season-divider.s0 { color: #f472b6; }  /* even-year winter  */
  .season-tag.s1, .season-divider.s1 { color: #fb923c; }  /* even-year spring  */
  .season-tag.s2, .season-divider.s2 { color: #a3e635; }  /* even-year summer  */
  .season-tag.s3, .season-divider.s3 { color: #22d3ee; }  /* even-year autumn  */
  .season-tag.s4, .season-divider.s4 { color: #a78bfa; }  /* odd-year winter   */
  .season-tag.s5, .season-divider.s5 { color: #facc15; }  /* odd-year spring   */
  .season-tag.s6, .season-divider.s6 { color: #34d399; }  /* odd-year summer   */
  .season-tag.s7, .season-divider.s7 { color: #60a5fa; }  /* odd-year autumn   */
  html[data-theme="light"] .season-tag.s0, html[data-theme="light"] .season-divider.s0 { color: #db2777; }
  html[data-theme="light"] .season-tag.s1, html[data-theme="light"] .season-divider.s1 { color: #ea580c; }
  html[data-theme="light"] .season-tag.s2, html[data-theme="light"] .season-divider.s2 { color: #65a30d; }
  html[data-theme="light"] .season-tag.s3, html[data-theme="light"] .season-divider.s3 { color: #0891b2; }
  html[data-theme="light"] .season-tag.s4, html[data-theme="light"] .season-divider.s4 { color: #7c3aed; }
  html[data-theme="light"] .season-tag.s5, html[data-theme="light"] .season-divider.s5 { color: #ca8a04; }
  html[data-theme="light"] .season-tag.s6, html[data-theme="light"] .season-divider.s6 { color: #059669; }
  html[data-theme="light"] .season-tag.s7, html[data-theme="light"] .season-divider.s7 { color: #2563eb; }
  /* Completed grid: full-width season rule between groups of neighbouring
     cards, tinted by the same cour palette as the badges. */
  .season-divider {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 10px;
    margin: 10px 0 -4px;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: .1em; color: var(--text-faint);
  }
  .season-divider:first-child { margin-top: 0; }
  .season-divider::before {
    content: ""; width: 26px; height: 2px; border-radius: 1px;
    background: currentColor; opacity: .8;
  }
  .season-divider::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, currentColor, transparent); opacity: .35;
  }
  /* bangumi community rating — same badge family as the season tag. */
  .score {
    font-size: 11px; font-weight: 600; font-family: var(--mono);
    padding: 2px 9px; border-radius: 999px; color: var(--warn);
    background: color-mix(in srgb, currentColor 12%, transparent);
  }

  .grouprow { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
  .grouprow b { color: var(--text); }
  .grouprow select {
    appearance: none;
    background: var(--input-bg)
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="%238b93a3" stroke-width="1.5" stroke-linecap="round"/></svg>')
      no-repeat right 10px center;
    color: var(--text); border: 1px solid var(--panel-border);
    border-radius: 999px; padding: 4px 26px 4px 10px; font: inherit; font-size: 12px;
    flex: 1; min-width: 0; max-width: 170px;
  }
  html[data-theme="light"] .grouprow select {
    background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" fill="none" stroke="%23526074" stroke-width="1.5" stroke-linecap="round"/></svg>');
  }
  .gracebar { font-size: 12px; color: var(--warn); display: flex; align-items: center; gap: 10px; }
  .gracebar .cd { font-family: var(--mono); font-size: 12.5px; }

  .readyline { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .readyline.ok { color: var(--ok); }
  .empty { color: var(--text-faint); font-size: 12px; font-style: italic; padding: 4px 2px; }
  .empty.warn { color: var(--warn); font-style: normal; }

  /* ---------- sections ---------- */
  .section-h {
    display: flex; align-items: center; gap: 12px; margin: 34px 0 14px;
    color: var(--text-dim); font-size: 12px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase;
  }
  .section-h::after, .sched-day::after { content: ""; flex: 1; height: 1px; background: var(--panel-border); }

  .prio { display: flex; gap: 8px; flex-wrap: wrap; }
  .prio .chip b { margin-right: 6px; color: var(--accent-b); font-family: var(--mono); }

  .logs {
    background: var(--log-bg); border: 1px solid var(--panel-border); border-radius: var(--radius);
    font-family: var(--mono); font-size: 11.5px; color: var(--log-text);
    padding: 14px 16px; max-height: 320px; overflow-y: auto; white-space: pre-wrap;
    scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) transparent;
    display: none;
  }
  .logs.open { display: block; }
  .logs::-webkit-scrollbar { width: 8px; }
  .logs::-webkit-scrollbar-track { background: transparent; }
  .logs::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 8px; }

  /* ---------- premiere notifications ---------- */
  .premieres { display: flex; flex-direction: column; gap: 12px; }
  .premieres:not(:empty) { margin-bottom: 26px; }
  .premiere-actions { display: flex; justify-content: flex-end; }
  .premiere {
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--accent-a) 16%, transparent),
      color-mix(in srgb, var(--accent-b) 10%, transparent));
    border: 1px solid color-mix(in srgb, var(--accent-a) 35%, transparent);
    border-radius: var(--radius);
    padding: 12px 16px; backdrop-filter: blur(8px);
    animation: slidein .35s ease;
  }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } }
  .premiere .pcover { width: 44px; min-width: 44px; height: 60px; border-radius: 8px; overflow: hidden; background: var(--media-bg); position: relative; }
  .premiere .pcover .ph { font-size: 18px; }
  .premiere .pbody { flex: 1; min-width: 0; }
  .premiere .ptitle { font-weight: 640; font-size: 14.5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .premiere .ptag { color: var(--accent-b); font-weight: 700; letter-spacing: .04em; }
  .premiere .psub { color: var(--text-dim); font-size: 12px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .premiere > .btn { flex-shrink: 0; margin-left: 4px; }
  .pbadge, .today-badge {
    font-size: 10.5px; font-weight: 600; letter-spacing: .04em;
    padding: 2px 9px; border-radius: 999px;
    background: color-mix(in srgb, currentColor 12%, transparent);
  }
  .pbadge { color: var(--ok); }

  /* ---------- filter/search toolbar + type pills ---------- */
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 2px 0 18px; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .fchip {
    appearance: none; cursor: pointer; font: inherit; font-size: 12.5px;
    padding: 6px 14px;
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .fchip:hover { color: var(--text); border-color: var(--hover-border); }
  .fchip b { color: var(--text); font-family: var(--mono); margin-left: 6px; font-weight: 600; }
  .fchip.active { color: var(--btn-text); background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); border-color: transparent; }
  .fchip.active b { color: var(--btn-text); }
  .search {
    appearance: none; font: inherit; font-size: 12.5px; color: var(--text);
    background: var(--input-bg); border: 1px solid var(--panel-border);
    border-radius: 999px; padding: 6px 14px; margin-left: auto; width: min(220px, 100%);
  }
  .search::placeholder { color: var(--text-faint); }
  .airline { font-size: 12px; color: var(--accent-b); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .airline .ai { opacity: .7; }

  /* ---------- weekly timetable: one vertical column per weekday ---------- */
  #cards.schedule { display: block; }
  .sched-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  /* Sub-filter chips are visually subordinate to the main tab row above. */
  .sched-filters .fchip { padding: 4px 11px; font-size: 12px; }
  .sched-filters .fchip.active {
    color: var(--accent-b);
    background: color-mix(in srgb, var(--accent-b) 14%, transparent);
    border-color: color-mix(in srgb, var(--accent-b) 40%, transparent);
  }
  .sched-filters .fchip.active b { color: var(--accent-b); }
  /* Season-only toggle: an independent filter dimension, so it reads as a
     switch rather than another premiere-status chip. Sits at the row's end. */
  .sched-toggle {
    display: inline-flex; align-items: center; gap: 8px; margin-left: auto;
    font-size: 12px; color: var(--text-faint); cursor: pointer; user-select: none;
  }
  .sched-toggle.on { color: var(--text); }
  .sched-toggle .track {
    position: relative; width: 34px; height: 18px; border-radius: 999px;
    background: var(--input-bg); border: 1px solid var(--panel-border);
    transition: background .15s ease, border-color .15s ease;
  }
  .sched-toggle.on .track {
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    border-color: transparent;
  }
  .sched-toggle .knob {
    position: absolute; top: 2px; left: 2px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--text-faint); transition: left .15s ease, background .15s ease;
  }
  .sched-toggle.on .knob { left: 18px; background: var(--btn-text); }
  .sched-board {
    display: flex; align-items: flex-start; gap: 12px;
    overflow-x: auto; padding-bottom: 14px;
    scroll-snap-type: x proximity;
    scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) transparent;
  }
  .sched-board::-webkit-scrollbar { height: 8px; }
  .sched-board::-webkit-scrollbar-track { background: transparent; }
  .sched-board::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 8px; }
  /* Every column carries the today-column box metrics so headers and card
     widths stay aligned; .today only recolors. */
  .sched-col {
    flex: 0 0 226px; min-width: 226px; max-width: 226px;
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px; border: 1px solid transparent; border-radius: var(--radius);
    scroll-snap-align: start;
  }
  .sched-day {
    display: flex; align-items: center; gap: 8px; margin: 2px 0 4px;
    color: var(--text-dim); font-size: 12px; letter-spacing: .16em; text-transform: uppercase;
  }
  .sched-col.today {
    background: color-mix(in srgb, var(--accent-b) 6%, transparent);
    border-color: color-mix(in srgb, var(--accent-b) 28%, transparent);
    box-shadow: 0 0 18px color-mix(in srgb, var(--accent-b) 10%, transparent);
  }
  .sched-col.today .sched-day { color: var(--accent-b); }
  .sched-col.today .sched-day::after { background: color-mix(in srgb, var(--accent-b) 35%, transparent); }
  .sched-day .today-badge { color: var(--accent-b); text-transform: none; }
  .sched-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 10px; backdrop-filter: blur(8px);
    cursor: pointer;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .sched-item:hover {
    border-color: color-mix(in srgb, var(--card-glow, var(--text-dim)) 60%, transparent);
    box-shadow: 0 0 14px color-mix(in srgb, var(--card-glow, var(--text-dim)) 22%, transparent);
  }
  .srow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
  .stime { font-family: var(--mono); font-size: 12.5px; }
  .stime.aired { color: var(--ok); }
  .stime.upcoming { color: var(--text-dim); }
  .scover { width: 34px; min-width: 34px; height: 46px; border-radius: 6px; overflow: hidden; background: var(--media-bg); position: relative; }
  .scover .ph { font-size: 15px; }
  .sbody { flex: 1; min-width: 0; }
  .stitle {
    font-weight: 640; font-size: 13px; line-height: 1.3; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .sbody .jp { margin-top: 2px; }

  /* ---------- toast ---------- */
  #toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--toast-bg); border: 1px solid var(--panel-border); color: var(--text);
    padding: 10px 20px; border-radius: 12px; font-size: 13px; opacity: 0;
    transition: opacity .25s ease, transform .25s ease; pointer-events: none; max-width: 80vw;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  html[data-theme="light"] #toast { box-shadow: 0 10px 30px rgba(13,23,40,.18); }

  .spin { display: inline-block; animation: rot 1s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }

  /* ---------- boot overlay ---------- */
  /* Full-viewport first-paint loader; real fetch stages drive the bar. */
  #boot {
    position: fixed; inset: 0; z-index: 200;
    display: grid; place-items: center;
    background: var(--bg);
    background-image:
      radial-gradient(900px 500px at 85% -10%, var(--glow-a), transparent 60%),
      radial-gradient(700px 400px at -5% 15%, var(--glow-b), transparent 60%);
    transition: opacity .45s ease, visibility .45s ease;
  }
  #boot.done { opacity: 0; visibility: hidden; pointer-events: none; }
  .boot-inner { display: flex; flex-direction: column; align-items: center; gap: 26px; padding: 24px; }
  .boot-spinner { position: relative; width: 92px; height: 92px; }
  .boot-spinner::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid var(--panel-border);
  }
  .boot-arc {
    position: absolute; inset: -1px; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0 52%, var(--accent-a) 76%, var(--accent-b) 100%);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
    animation: rot 1.1s linear infinite;
  }
  .boot-core {
    position: absolute; inset: 0; margin: auto;
    width: 36px; height: 36px;
    filter: drop-shadow(0 0 16px color-mix(in srgb, var(--accent-a) 65%, transparent));
    animation: corepulse 2.2s ease-in-out infinite;
  }
  .boot-core svg { display: block; width: 100%; height: 100%; }
  @keyframes corepulse { 50% { transform: scale(.8); opacity: .7; } }
  .boot-name { text-align: center; }
  /* letter-spacing trails the last glyph — offset to keep the optical center */
  .boot-brand { font-size: 16px; font-weight: 650; letter-spacing: .3em; margin-left: .3em; }
  .boot-sub { color: var(--text-faint); font-size: 11px; letter-spacing: .06em; margin-top: 5px; }
  .boot-bar {
    width: min(300px, 72vw); height: 3px; border-radius: 999px;
    background: var(--panel-border); overflow: hidden;
  }
  .boot-bar i {
    display: block; height: 100%; width: 0; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
    box-shadow: 0 0 10px color-mix(in srgb, var(--accent-b) 60%, transparent);
    transition: width .25s ease;
  }
  .boot-status {
    display: flex; align-items: baseline; gap: 10px; margin-top: -12px;
    color: var(--text-dim); font-size: 12px; letter-spacing: .05em;
  }
  .boot-status .pct { font-family: var(--mono); color: var(--text-faint); font-size: 11.5px; }
  #boot.err .boot-status { color: var(--warn); }
  #boot.err .boot-bar i { background: var(--warn); box-shadow: none; }

  /* ---------- small screens / touch ---------- */
  @media (max-width: 480px) {
    .wrap { padding: 16px 12px 64px; }
    header { gap: 8px 10px; margin-bottom: 16px; }
    .brand small { display: none; }
    .search { margin-left: 0; }
  }
  @media (pointer: coarse) {
    .btn.small, .fchip { min-height: 40px; }
    .grouprow select { font-size: 16px; min-height: 40px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .spin, .boot-arc { animation: rot 1.5s linear infinite !important; }  /* progress convention */
  }
</style>
</head>

<script>
// ---------------------------------------------------------------------------
// i18n: every user-facing string lives here; the code renders through t().
// Language auto-detects from the browser, is toggleable, and persists.
// ---------------------------------------------------------------------------
const I18N = {

  },
  zh: {

    langHint: "界面语言",
    themeHint: "主题 — 点击轮换 跟随系统 / 深色 / 浅色",
    season: "季度", lastSync: "上次同步", syncNow: "立即同步", syncing: "同步中…",
    subgroupPriority: "字幕组优先级", daemonLog: "守护进程日志", show: "展开", hide: "收起",

    via: "字幕组", switch: "切换", waitingAni: "等待 ANi", lockBest: "锁定当前最优",

    syncFailStart: e => "同步启动失败：" + e,
    openDropdown: "请先展开下拉菜单以加载字幕组",
    loadGroupsFail: e => "字幕组加载失败：" + e,
    switchFail: e => "切换失败：" + e,
    switchWarn: n => "已切换，但有警告：" + n,
    switchConfirm: g => `切换到 ${g}？\n\n这会删除本番当前旧字幕组已下载的文件，再从 ${g} 重下整季。此操作不可撤销。`,
    switchedDel: (g, n) => `已切换到 ${g}，删除旧组 ${n} 个种子+文件`,
    failed: e => "操作失败：" + e,
    already_running: "同步已在进行中",
    grace_ended: "宽限期已结束 — 下轮同步（≤5 分钟）将锁定当前最优字幕组",
    switched: g => `规则已切换到 ${g}`,

    no_mikan_feed: "该规则没有 mikan feed，无法切换",
    mikan_fetch_failed: "mikan 页面获取失败",
    setrule_failed: "qBittorrent 规则更新失败",
    premiered: "已开播",
    nowWatching: "已自动标为在看",
    gotIt: "知道了",
    dismissAll: "全部知道了",
    searchPh: "搜索番名…",
    noMatch: "没有匹配的番剧",
    scoreHint: "bangumi 评分",
    t_watching: "在看", t_want: "想看",
    t_done: "看过", t_onhold: "搁置", t_dropped: "抛弃",
    airsLabel: "开播", airedLabel: "开播",
    theme_auto: "◐ 跟随系统", theme_dark: "● 深色", theme_light: "○ 浅色",
    t_schedule: "时刻表",
    days: ["周一", "周二", "周三", "周四", "周五", "周六", "周日"],
    timeTBA: "时间待定", today: "今天",
    scheduleEmpty: "暂无开播时间数据 — AniList 查询完成后会自动补齐",
    sched_all: "全部", sched_aired: "已开播", sched_upcoming: "未开播",
    sched_season_only: "仅本季",
    noSeason: "季度未知",
  },
};

const FILTER_ORDER = ["watching", "want", "done", "onhold", "dropped"];

// Persisted UI state is sanitized on read (hand-edited/legacy localStorage
// values must not leak raw i18n keys into the header) and can be overridden
// per-visit through URL params: ?lang=zh&theme=light&tab=schedule — handy for
// deep links and screenshots. URL overrides are not persisted.
const QS = new URLSearchParams(location.search);
const pick = (v, list, def) => (list.includes(v) ? v : def);
let lang = pick(
  QS.get("lang") || localStorage.getItem("lang") ||
    ((navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en"),
  ["en", "zh"], "en");
let themeMode = pick(QS.get("theme") || localStorage.getItem("theme") || "auto",
  ["auto", "dark", "light"], "auto");
let activeType = pick(QS.get("tab") || localStorage.getItem("tab") || "watching",
  [...FILTER_ORDER, "schedule"], "watching");
let schedFilter = pick(localStorage.getItem("schedFilter") || "all",
  ["all", "aired", "upcoming"], "all");   // timetable premiere-status filter
let schedSeasonOnly = localStorage.getItem("schedSeasonOnly") === "1";  // timetable: limit to current cour

let state = null;
let collections = null;
let logsOpen = false;
let logsTimer = null;
let offline = false;
let syncPoll = null;
let seqO = 0, seqC = 0, seqN = 0;   // out-of-order response guards per endpoint

const $ = id => document.getElementById(id);
const esc = s => (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const loc = () => (lang === "zh" ? "zh-CN" : "en-US");

// Skip the innerHTML swap when this render pass produced the same markup —
// keeps focus, open dropdowns, scroll positions, and entry animations intact
// across the 30s polls (3 of 4 of which re-render byte-identical data).
function setHTML(el, html) {
  if (el._last === html) return;
  el._last = html;
  el.innerHTML = html;
}

const coverHtml = url => url ? `<img src="${esc(url)}" loading="lazy" alt="">` : `<div class="ph">◌</div>`;
const bgmLink = (id, text) => `<a href="https://bgm.tv/subject/${id}" target="_blank" rel="noopener">${text}</a>`;

// Local-timezone premiere string; falls back to the (date-only) bgm premiere
// date when AniList has no timestamp — localized either way so neighboring
// cards don't mix formats.
function fmtLocal(airingAt, premiereDate) {
  if (airingAt) {
    return new Date(airingAt * 1000).toLocaleString(loc(),
      { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short", hour: "2-digit", minute: "2-digit" });
  }
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(premiereDate || "");
  if (!m) return "";
  return new Date(+m[1], +m[2] - 1, +m[3]).toLocaleDateString(loc(),
    { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short" });
}

// Compact localized "MM-DD hh:mm" for log-ish stamps (last sync, premiere
// detection time). Falls back to the raw string for unparsable input.
function fmtStamp(raw) {
  const ts = Date.parse((raw || "").replace(" ", "T"));
  if (Number.isNaN(ts)) return raw || "—";
  return new Date(ts).toLocaleString(loc(),
    { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
}

// Card titles follow the UI language: English/romaji (from AniList, when known)
// in English mode, the bgm Chinese title otherwise. The original name renders
// as a sub-line only when it differs from the main title.
const displayTitle = s => lang === "en" ? (s.title_en || s.title_jp || s.title) : (s.title || s.title_jp);
const jpLine = s => {
  const main = displayTitle(s);
  return s.title_jp && s.title_jp !== main
    ? `<div class="jp" title="${esc(s.title_jp)}">${esc(s.title_jp)}</div>` : "";
};

function t(key, arg) {
  const v = (I18N[lang] || I18N.en)[key];
  return typeof v === "function" ? v(arg) : (v == null ? key : v);
}

// Mutating endpoints answer errors as {"detail": {"code": ..., "message"?: ...}};
// render the code through i18n when we know it, fall back to the raw payload.
function errText(d, r) {
  const det = d && d.detail;
  if (det && typeof det === "object" && det.code)
    return (I18N.en[det.code] ? t(det.code) : det.code) + (det.message ? ": " + det.message : "");
  if (typeof det === "string") return det;
  return det ? JSON.stringify(det) : "HTTP " + (r ? r.status : "?");
}

function setLang(l) {
  lang = l;
  document.documentElement.lang = (l === "zh" ? "zh-CN" : "en");
  applyStatic();
  render();
  refreshPremieres();
}
// Only an explicit toggle pins the language; plain visits keep following the browser.
function toggleLang() {
  const l = lang === "zh" ? "en" : "zh";
  localStorage.setItem("lang", l);
  setLang(l);
}

// Theme: auto (follow the OS, default) → dark → light, persisted.
const themeMedia = window.matchMedia("(prefers-color-scheme: light)");
function applyTheme() {
  const eff = themeMode === "auto" ? (themeMedia.matches ? "light" : "dark") : themeMode;
  document.documentElement.dataset.theme = eff;
}
function cycleTheme() {
  themeMode = themeMode === "auto" ? "dark" : themeMode === "dark" ? "light" : "auto";
  localStorage.setItem("theme", themeMode);
  applyTheme();
  applyStatic();
}
themeMedia.addEventListener("change", () => { if (themeMode === "auto") applyTheme(); });

function applyStatic() {
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  const lb = $("langbtn");
  lb.textContent = t("langBtn");
  lb.title = t("langHint"); lb.setAttribute("aria-label", t("langHint"));
  const tb = $("themebtn");
  tb.textContent = t("theme_" + themeMode);
  tb.title = t("themeHint"); tb.setAttribute("aria-label", t("themeHint"));
  $("search").placeholder = t("searchPh");
  $("logbtn").textContent = logsOpen ? t("hide") : t("show");
  syncBtnUI();
}

function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._h);
  el._h = setTimeout(() => el.classList.remove("show"), 3500);
}

const STATUS_KEY = {
  grace: "st_grace", unresolved: "st_unresolved", manual: "st_manual",
};

// "YYYY.MM" → s0..s7: 4 cours × 2 years, so the palette repeats every 2 years.
function seasonClass(season) {
  const m = /^(\d{4})\.(\d{2})$/.exec(season || "");
  if (!m) return "";
  const q = { "01": 0, "04": 1, "07": 2, "10": 3 }[m[2]] ?? 0;
  return "s" + ((+m[1] % 2) * 4 + q);
}

// Card click → the show's bangumi subject page. Ignores clicks on the card's
// own controls (title link, switch button, subgroup dropdown, etc.) so they
// keep working; the title itself is a real <a> for keyboard/middle-click.
function openBgm(e, bgmId) {
  if (e.target.closest("button, select, a")) return;
  window.open("https://bgm.tv/subject/" + bgmId, "_blank", "noopener");
}

function fmtCountdown(expires) {
  const s = Math.max(0, Math.floor(expires - Date.now() / 1000));
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), ss = s % 60;
  return `${h}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

const groupLabel = rule =>
  rule.subgroup_name || (rule.subgroup ? "#" + rule.subgroup : "?");

// bangumi community rating badge; bgm sends 0 / null for unrated subjects.
const scoreTag = s =>
  s.score ? `<span class="score" title="${esc(t("scoreHint"))}">★ ${(+s.score).toFixed(1)}</span>` : "";

function card(show) {
  const st = show.status;
  // "subscribed" is the normal state — only exceptional statuses get a pill.
  const pill = STATUS_KEY[st] ? `<span class="pill ${st}">${t(STATUS_KEY[st])}</span>` : "";

  let groupRow = "";
  if (show.rule && show.rule.mikan_id) {
    groupRow = `
      <div class="grouprow">
        <span>${t("via")}</span>
        <select id="sel-${show.bgm_id}" data-loaded="0"
                aria-label="${esc(t("via") + " — " + displayTitle(show))}"
                onfocus="loadSubgroups(${show.bgm_id}, ${show.rule.mikan_id}, ${show.rule.subgroup})">
          <option>${esc(groupLabel(show.rule))}</option>
        </select>
        <button class="btn ghost small" onclick="switchGroup(${show.bgm_id})">${t("switch")}</button>
      </div>`;
  } else if (show.rule) {
    // Rule without a mikan feed: nothing to switch, show the group read-only.
    groupRow = `<div class="grouprow"><span>${t("via")} <b>${esc(groupLabel(show.rule))}</b></span></div>`;
  }

  let graceRow = "";
  if (st === "grace" && show.grace) {
    // Render the already-expired state directly: the 30s re-render must not
    // resurrect a dead 0:00:00 countdown + button for the ticker to re-kill.
    graceRow = show.grace.expires <= Date.now() / 1000
      ? `<div class="gracebar">${t("grace_ended")}</div>`
      : `
      <div class="gracebar">
        <span>${t("waitingAni")}</span>
        <span class="cd" data-expires="${show.grace.expires}">${fmtCountdown(show.grace.expires)}</span>
        <button class="btn ghost small" onclick="endGrace(${show.bgm_id})">${t("lockBest")}</button>
      </div>`;
  }

  // Episode summary instead of per-torrent rows: "done/total ready to watch".
  let torrents = "";
  if (show.torrents.length) {
    const done = show.torrents.filter(tr => tr.progress >= 1).length;
    torrents = `<div class="readyline ${done ? "ok" : ""}">▸ ${t("epReady", { done, total: show.torrents.length })}</div>`;
  } else if (st === "subscribed") {
    // Empty feed and dead qB look identical from here — say which it is.
    torrents = state && state.qb_ok === false
      ? `<div class="empty warn">${t("qbUnknown")}</div>`
      : `<div class="empty">${t("noEpisodes")}</div>`;
  } else if (st === "unresolved") {
    torrents = `<div class="empty">${t("notOnMikan")}</div>`;
  }

  const seasonTag = show.season ? `<span class="season-tag ${seasonClass(show.season)}">${esc(show.season)}</span>` : "";
  const score = scoreTag(show);
  const meta = pill || seasonTag || score ? `<div class="meta">${pill}${seasonTag}${score}</div>` : "";
  const when = fmtLocal(show.airing_at, show.premiere_date);
  const airRow = when
    ? `<div class="airline"><span class="ai">▸</span>${t(hasAired(show) ? "airedLabel" : "airsLabel")} ${esc(when)}</div>` : "";
  return `<div class="card t-watching" onclick="openBgm(event, ${show.bgm_id})">
    <div class="cover">${coverHtml(show.image)}</div>
    <div class="card-body">
      ${meta}
      <h3>${bgmLink(show.bgm_id, esc(displayTitle(show)))}</h3>
      ${jpLine(show)}
      ${airRow}${groupRow}${graceRow}${torrents}
    </div>
  </div>`;
}

// Compact card for non-在看 collection types (no rule/torrent enrichment).
function basicCard(s) {
  const when = fmtLocal(s.airing_at, s.premiere_date);
  const airRow = when
    ? `<div class="airline"><span class="ai">▸</span>${t(hasAired(s) ? "airedLabel" : "airsLabel")} ${esc(when)}</div>` : "";
  const seasonTag = s.season ? `<span class="season-tag ${seasonClass(s.season)}">${esc(s.season)}</span>` : "";
  const score = scoreTag(s);
  const meta = seasonTag || score ? `<div class="meta">${seasonTag}${score}</div>` : "";
  return `<div class="card t-${s.type}" onclick="openBgm(event, ${s.bgm_id})">
    <div class="cover">${coverHtml(s.image)}</div>
    <div class="card-body">
      ${meta}
      <h3>${bgmLink(s.bgm_id, esc(displayTitle(s)))}</h3>
      ${jpLine(s)}
      ${airRow}
    </div>
  </div>`;
}

// One template for the tab chips and the timetable sub-filter chips.
const fchipBtn = (key, label, count, active, fn) =>
  `<button class="chip fchip ${active ? "active" : ""}" aria-pressed="${active}"
     onclick="${fn}('${key}')">${label}${count != null ? `<b>${count}</b>` : ""}</button>`;

function renderFilters() {
  if (!collections) return;
  const c = collections.counts || {};
  const visible = FILTER_ORDER.filter(k => (c[k] || 0) > 0);
  // The active tab can vanish (its count drops to 0) — retarget instead of
  // leaving a blank grid with no chip highlighted.
  if (activeType !== "schedule" && !visible.includes(activeType)) activeType = visible[0] || "schedule";
  const chips = visible.map(k => fchipBtn(k, t("t_" + k), c[k], activeType === k, "setFilter"));
  chips.push(fchipBtn("schedule", t("t_schedule"), null, activeType === "schedule", "setFilter"));
  setHTML($("filters"), chips.join(""));
}

function setFilter(k) {
  activeType = k;
  localStorage.setItem("tab", k);
  renderFilters();
  renderCards();
}

// Sort key: precise AniList timestamp, else the bgm premiere date; unknown last.
function airMs(s) {
  if (s.airing_at) return s.airing_at * 1000;
  const p = Date.parse(s.premiere_date || s.date || "");
  return Number.isNaN(p) ? Infinity : p;
}
const byAir = (a, b) => airMs(a) - airMs(b);

// Completed tab: newest cour block first; inside a block the most recently
// marked show leads (bgm's updated_at stamps the last collection edit — a
// close proxy for "when I finished it"). Season-less shows sink to the end.
const markedMs = s => Date.parse(s.updated_at || "") || 0;
const byDone = (a, b) =>
  (b.season || "").localeCompare(a.season || "") || markedMs(b) - markedMs(a);

// Completed grid: one full-width season rule ahead of each cour block.
function withSeasonDividers(shows) {
  const out = [];
  let prev = null;
  for (const s of shows) {
    const season = s.season || "";
    if (season !== prev) {
      out.push(`<div class="season-divider ${seasonClass(season)}">${season ? esc(season) : t("noSeason")}</div>`);
      prev = season;
    }
    out.push(basicCard(s));
  }
  return out;
}

// Live title filter from the search box (matches any of the three title fields).
function searchMatch(s) {
  const q = ($("search").value || "").trim().toLowerCase();
  return !q || [s.title, s.title_jp, s.title_en].some(x => x && x.toLowerCase().includes(q));
}

function renderCards() {
  $("search").hidden = activeType === "schedule";
  $("cards").classList.toggle("schedule", activeType === "schedule");
  if (activeType === "schedule") {
    renderSchedule();
    return;
  }
  // Leave the grid alone while a subgroup dropdown is open/focused — replacing
  // it mid-choice closes the popup and reverts the user's selection.
  const ae = document.activeElement;
  if (ae && ae.tagName === "SELECT" && $("cards").contains(ae)) return;
  let list = null;
  if (activeType === "watching") {
    if (!state) return;
    list = state.shows.slice().sort(byAir).filter(searchMatch).map(card);
  } else if (collections) {
    const shows = (collections.groups[activeType] || []).filter(searchMatch);
    // 看过 reads as a viewing history: newest cour on top, split per cour.
    list = activeType === "done"
      ? withSeasonDividers(shows.sort(byDone))
      : shows.sort(byAir).map(basicCard);
  }
  if (list === null) return;
  const empty = ($("search").value || "").trim() ? t("noMatch") : "—";
  setHTML($("cards"), list.join("") || `<div class="empty">${empty}</div>`);
}

// Premiere status: episode 1's timestamp (or the bgm date) is in the past.
const hasAired = s => airMs(s) <= Date.now();

// Weekly timetable: watching + plan-to-watch shows, one vertical column per
// weekday. Columns start at today and wrap around the week; each column is
// sorted by local time of day. A sub-filter narrows the board by premiere
// status, and the board scrolls horizontally when it doesn't fit.
function renderSchedule() {
  // Keep the loading placeholder when booting straight onto this tab.
  if (!collections) return;
  let all = ["watching", "want"].flatMap(k => collections.groups[k] || []);
  if (!all.length) {
    setHTML($("cards"), `<div class="empty">${t("scheduleEmpty")}</div>`);
    return;
  }
  // Season-only narrows the pool before everything else, so the premiere-status
  // counts below reflect just the current cour. A missing state.season leaves
  // the pool untouched rather than blanking the board. Pinned shows (old cours
  // still airing weekly) count as current and are never hidden by this filter.
  const cur = state && state.season;
  if (schedSeasonOnly && cur) all = all.filter(s => s.season === cur || s.pinned);
  const counts = {
    all: all.length,
    aired: all.filter(hasAired).length,
    upcoming: all.filter(s => !hasAired(s)).length,
  };
  const chips = ["all", "aired", "upcoming"]
    .map(k => fchipBtn(k, t("sched_" + k), counts[k], schedFilter === k, "setSchedFilter")).join("");
  const seasonToggle = `<button class="sched-toggle ${schedSeasonOnly ? "on" : ""}"
      aria-pressed="${schedSeasonOnly}" onclick="setSchedSeasonOnly(${!schedSeasonOnly})">
      <span class="track"><span class="knob"></span></span>${t("sched_season_only")}</button>`;

  const shows = schedFilter === "all" ? all : all.filter(s => hasAired(s) === (schedFilter === "aired"));
  const days = [[], [], [], [], [], [], []];  // Mon..Sun
  const tba = [];
  for (const s of shows) {
    if (s.airing_at) days[(new Date(s.airing_at * 1000).getDay() + 6) % 7].push(s);
    else tba.push(s);
  }
  const minuteOf = s => { const d = new Date(s.airing_at * 1000); return d.getHours() * 60 + d.getMinutes(); };
  const today = (new Date().getDay() + 6) % 7;
  const names = t("days");
  const col = (name, isToday, list) => {
    const badge = isToday ? `<span class="today-badge">${t("today")}</span>` : "";
    const body = list.length ? list.map(schedItem).join("") : `<div class="empty">—</div>`;
    return `<div class="sched-col ${isToday ? "today" : ""}">
      <div class="sched-day">${name}${badge}</div>${body}
    </div>`;
  };
  let board = "";
  for (let off = 0; off < 7; off++) {
    const i = (today + off) % 7;
    days[i].sort((a, b) => minuteOf(a) - minuteOf(b) || byAir(a, b));
    board += col(names[i], off === 0, days[i]);
  }
  if (tba.length) board += col(t("timeTBA"), false, tba.slice().sort(byAir));
  // Keep the horizontal scroll position across re-renders.
  const prev = $("cards").querySelector(".sched-board");
  const sl = prev ? prev.scrollLeft : 0;
  setHTML($("cards"), `<div class="sched-filters">${chips}${seasonToggle}</div>
    <div class="sched-board" tabindex="0" role="region" aria-label="${esc(t("t_schedule"))}">${board}</div>`);
  const board2 = $("cards").querySelector(".sched-board");
  if (board2 && sl) board2.scrollLeft = sl;
}

function setSchedFilter(k) {
  schedFilter = k;
  localStorage.setItem("schedFilter", k);
  renderCards();
}

function setSchedSeasonOnly(on) {
  schedSeasonOnly = !!on;
  localStorage.setItem("schedSeasonOnly", on ? "1" : "0");
  renderCards();
}

function schedItem(s) {
  const d = s.airing_at ? new Date(s.airing_at * 1000) : null;
  const hm = d ? `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}` : "--:--";
  // Air status lives in the time's color (green = aired, dim = upcoming) so
  // each card carries a single pill — the collection type.
  const aired = hasAired(s);
  const title = displayTitle(s);
  const when = fmtLocal(s.airing_at, s.premiere_date);
  const airRow = when
    ? `<div class="airline"><span class="ai">▸</span>${t(aired ? "airedLabel" : "airsLabel")} ${esc(when)}</div>` : "";
  return `<div class="sched-item t-${s.type}" onclick="openBgm(event, ${s.bgm_id})">
    <div class="scover">${coverHtml(s.image)}</div>
    <div class="sbody">
      <div class="srow"><span class="stime ${aired ? "aired" : "upcoming"}">${hm}</span><span class="pill ${s.type}">${t("t_" + s.type)}</span></div>
      <div class="stitle" title="${esc(title)}">${bgmLink(s.bgm_id, esc(title))}</div>
      ${jpLine(s)}
      ${airRow}
    </div>
  </div>`;
}

function renderHeader() {
  $("season").textContent = state.season;
  const chip = $("synchip");
  chip.classList.remove("warn");
  $("lastsync").textContent = state.last_sync ? fmtStamp(state.last_sync) : "—";
  $("lastsync").title = state.last_sync || "";
  const qb = $("qbwarn");
  qb.hidden = state.qb_ok !== false;
  if (!qb.hidden) qb.textContent = t("qbDown");
  setHTML($("prio"), state.group_priority
    .map((g, i) => `<span class="chip"><b>#${i + 1}</b>${esc(g.name)}</span>`)
    .join("") + `<span class="chip warn">${t("graceH", state.grace_hours)}</span>`);
  if (state.sync_running) watchSync();
  syncBtnUI();
}

function render() {
  if (!state) return;
  renderHeader();
  renderFilters();
  renderCards();
}

function syncBtnUI() {
  const btn = $("syncbtn");
  if (btn._busy) {
    btn.disabled = true;
    btn.innerHTML = `<span class="spin">◌</span>&nbsp;${t("syncing")}`;
  } else {
    btn.disabled = false;
    btn.textContent = t("syncNow");
  }
}

// ---------------------------------------------------------------------------
// Boot overlay: full-screen loader for the first paint. Each successful fetch
// raises the progress ceiling; a trickle timer glides the bar toward it so it
// never looks frozen. Dismissed — and removed — after the first full render,
// so every helper no-ops for the lifetime 30s polls that follow.
// ---------------------------------------------------------------------------
let bootCeil = 0, bootVal = 0, bootTimer = null, bootRetry = null;

function bootStage(ceil, key) {
  if (!$("boot")) return;
  $("boot").classList.remove("err");
  bootCeil = Math.max(bootCeil, ceil);
  $("bootmsg").textContent = t(key);
  if (!bootTimer) bootTimer = setInterval(() => {
    bootVal = Math.min(bootCeil, bootVal + Math.max(.4, (bootCeil - bootVal) * .12));
    $("bootfill").style.width = bootVal + "%";
    $("bootpct").textContent = Math.round(bootVal) + "%";
  }, 120);
}

function bootError(msg) {
  if (!$("boot")) return;
  $("boot").classList.add("err");
  $("bootmsg").textContent = msg;
  // Retry fast while the overlay is up — the 30s poll is too slow to stare at.
  clearTimeout(bootRetry);
  bootRetry = setTimeout(refresh, 5000);
}

function bootDone() {
  const el = $("boot");
  if (!el) return;
  if (QS.has("boothold")) return;   // ?boothold keeps the overlay up for screenshots
  clearInterval(bootTimer); bootTimer = null;
  clearTimeout(bootRetry);
  $("bootfill").style.width = "100%";
  $("bootpct").textContent = "100%";
  // Let the bar visibly reach 100% before the fade, then drop the node.
  setTimeout(() => { el.classList.add("done"); setTimeout(() => el.remove(), 500); }, 200);
}

async function refresh() {
  const q = ++seqO;
  bootStage(35, "bootConnect");
  try {
    const d = await (await fetch("/api/overview")).json();
    if (q !== seqO) return;   // an out-of-order older response must not win
    state = d;
    offline = false;
    render();
    bootStage(75, "bootCollections");
    await refreshCollections();
    bootStage(94, "bootNotif");
    // after collections so banner titles can follow the UI language; awaited
    // only so the boot bar reflects it — it swallows its own errors.
    await refreshPremieres();
    bootDone();
  } catch (e) {
    if (q !== seqO) return;
    // Toast once per outage, then hold a persistent indicator in the header —
    // the dashboard keeps showing the last known (possibly stale) data.
    if (!offline) { offline = true; toast(t("backendUnreachable", e.message)); }
    $("synchip").classList.add("warn");
    $("lastsync").textContent = t("offline");
    if (!state) setHTML($("cards"), `<div class="empty">${esc(t("backendUnreachable", e.message))}</div>`);
    bootError(t("backendUnreachable", e.message));
  }
}

async function refreshCollections() {
  const q = ++seqC;
  try {
    const d = await (await fetch("/api/collections")).json();
    if (q !== seqC) return;
    collections = d;
    renderFilters();   // may retarget activeType if its tab vanished
    renderCards();
  } catch (e) { /* transient */ }
}

async function refreshPremieres() {
  const q = ++seqN;
  try {
    const d = await (await fetch("/api/notifications")).json();
    if (q !== seqN) return;
    // A premiere banner stays on the dashboard for a week after detection,
    // unless the user dismisses it earlier.
    const WEEK_MS = 7 * 86400 * 1000;
    const unread = d.notifications.filter(n => {
      if (n.read) return false;
      const ts = Date.parse(n.detected_at || "");
      return Number.isNaN(ts) || Date.now() - ts < WEEK_MS;
    });
    const banners = unread.map(n => {
      const badge = n.promoted ? `<span class="pbadge">${t("nowWatching")}</span>` : "";
      const when = fmtStamp(n.detected_at);
      // Notifications store the title at detection time — prefer the live
      // collections entry so the banner follows the UI language too.
      const src = (collections && FILTER_ORDER.flatMap(k => collections.groups[k] || [])
        .find(x => x.bgm_id === n.bgm_id)) || n;
      const title = displayTitle(src);
      const sub = [n.title_jp !== title ? esc(n.title_jp) : "", esc(n.subgroup_name || ""), esc(when)]
        .filter(Boolean).join(" · ");
      return `<div class="premiere" data-bgm="${n.bgm_id}" onclick="openBgm(event, ${n.bgm_id})">
        <div class="pcover">${coverHtml(n.image)}</div>
        <div class="pbody">
          <div class="ptitle">🎬 <span class="ptag">${t("premiered")}</span>${bgmLink(n.bgm_id, esc(title))}${badge}</div>
          <div class="psub" title="${sub}">${sub}</div>
        </div>
        <button class="btn ghost small" onclick="dismissPremiere(${n.bgm_id})">${t("gotIt")}</button>
      </div>`;
    });
    if (unread.length > 1) {
      banners.unshift(`<div class="premiere-actions">
        <button class="btn ghost small" onclick="dismissAllPremieres()">${t("dismissAll")}</button>
      </div>`);
    }
    setHTML($("premieres"), banners.join(""));
  } catch (e) { /* transient */ }
}

async function markPremieresRead(bgmId) {
  await fetch("/api/notifications/read", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ bgm_id: bgmId }),
  });
}

async function dismissPremiere(bgmId) {
  // Optimistic: drop the banner immediately, restore via refresh on failure.
  const el = document.querySelector(`.premiere[data-bgm="${bgmId}"]`);
  if (el) { el.remove(); $("premieres")._last = null; }
  try {
    await markPremieresRead(bgmId);
  } catch (e) {
    toast(t("failed", e.message));
  }
  refreshPremieres();
}

async function dismissAllPremieres() {
  try {
    await markPremieresRead(null);
  } catch (e) {
    toast(t("failed", e.message));
  }
  refreshPremieres();
}

// One shared fast poll drives the sync button lifecycle — used both by the
// button itself and by render() when a page load finds a sync already running
// (second tab / reload mid-sync), so every tab converges within 1.5s.
function watchSync() {
  if (syncPoll) return;
  const btn = $("syncbtn");
  btn._busy = true;
  syncBtnUI();
  let misses = 0;
  syncPoll = setInterval(async () => {
    try {
      const s = await (await fetch("/api/sync/status")).json();
      misses = 0;
      if (!s.running) {
        clearInterval(syncPoll); syncPoll = null;
        btn._busy = false;
        syncBtnUI();
        if (s.ok === false) {
          // The pass crashed — the traceback is in the sync buffer; open the
          // log panel on it instead of pretending everything is fine.
          toast(t("syncFailed"));
          if (!logsOpen) toggleLogs(); else pullLogs();
        } else {
          toast(t("syncFinished"));
        }
        refresh();
      }
    } catch (e) {
      // Give a restarting backend ~15s before releasing the button —
      // otherwise it sticks on "Syncing…" forever.
      if (++misses >= 10) {
        clearInterval(syncPoll); syncPoll = null;
        btn._busy = false;
        syncBtnUI();
        toast(t("backendUnreachable", e.message));
      }
    }
  }, 1500);
}

async function runSync() {
  const btn = $("syncbtn");
  btn._busy = true;
  syncBtnUI();
  try {
    const r = await (await fetch("/api/sync", { method: "POST" })).json();
    if (!r.started) toast(t(r.code || "already_running"));
    watchSync();
  } catch (e) {
    btn._busy = false;
    syncBtnUI();
    toast(t("syncFailStart", e.message));
  }
}

async function endGrace(bgmId) {
  try {
    const r = await fetch("/api/grace/expire", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ bgm_id: bgmId }),
    });
    const d = await r.json();
    toast(r.ok ? t(d.code || "grace_ended") : t("failed", errText(d, r)));
    if (r.ok) refresh();
  } catch (e) { toast(t("failed", e.message)); }
}

async function loadSubgroups(bgmId, mikanId, currentGid) {
  const sel = $("sel-" + bgmId);
  if (!sel || sel.dataset.loaded === "1" || sel.dataset.loading === "1") return;
  sel.dataset.loading = "1";
  // Show that something is happening — the mikan page fetch takes a moment.
  const ph = document.createElement("option");
  ph.disabled = true;
  ph.textContent = t("loading");
  sel.appendChild(ph);
  try {
    const d = await (await fetch("/api/subgroups/" + mikanId)).json();
    sel.innerHTML = d.subgroups
      .map(g => `<option value="${g.id}" ${g.id === currentGid ? "selected" : ""}>${g.name ? esc(g.name) : "#" + g.id}</option>`)
      .join("");
    // Only mark loaded once real options are in place — Switch clicks during
    // the fetch must keep hitting the "open the dropdown first" guard.
    sel.dataset.loaded = "1";
  } catch (e) {
    ph.remove();
    toast(t("loadGroupsFail", e.message));
  } finally {
    sel.dataset.loading = "0";
  }
}

// The rule name is looked up from state by bgm_id instead of being inlined
// into onclick — titles can contain quotes/backslashes that break the handler.
async function switchGroup(bgmId) {
  const sel = $("sel-" + bgmId);
  if (!sel || sel.dataset.loaded !== "1") { toast(t("openDropdown")); return; }
  const show = ((state && state.shows) || []).find(x => x.bgm_id === bgmId);
  if (!show || !show.rule) return;
  const gid = parseInt(sel.value, 10);
  if (Number.isNaN(gid)) { toast(t("openDropdown")); return; }
  // Same group already active — nothing to replace, skip the scary confirm.
  if (gid === show.rule.subgroup) { toast(t("switched", groupLabel(show.rule))); return; }
  // Switching now DELETES the old group's files (irreversible) — confirm once.
  const gname = (sel.options[sel.selectedIndex] || {}).text || String(gid);
  if (!confirm(t("switchConfirm", gname))) return;
  try {
    const r = await fetch("/api/rule/switch", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rule_name: show.rule.name, subgroup: gid }),
    });
    const d = await r.json();
    if (r.ok) {
      // Surface best-effort failures (mikan resubscribe, old feed removal) —
      // "switched" alone would hide a mikan side now out of sync.
      toast(d.notes && d.notes.length ? t("switchWarn", d.notes.join("; "))
            : (d.deleted ? t("switchedDel", d.group, d.deleted)
                         : t(d.code || "switched", d.group)));
      refresh();
    } else {
      toast(t("switchFail", errText(d, r)));
    }
  } catch (e) { toast(t("switchFail", e.message)); }
}

function toggleLogs() {
  logsOpen = !logsOpen;
  const el = $("logs");
  el.classList.toggle("open", logsOpen);
  $("logbtn").textContent = logsOpen ? t("hide") : t("show");
  $("logbtn").setAttribute("aria-expanded", String(logsOpen));
  if (logsOpen) {
    if (!el.textContent.trim()) el.textContent = "…";
    pullLogs();
    logsTimer = setInterval(pullLogs, 5000);
  } else clearInterval(logsTimer);
}

async function pullLogs() {
  try {
    const el = $("logs");
    const stick = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
    // While a manual sync runs, show its live output — the daemon log never
    // sees manual passes. After it ends, keep the buffer readable below the
    // daemon log (it holds the summary or the traceback).
    const s = await (await fetch("/api/sync/status")).json();
    let lines;
    if (s.running && s.output) {
      lines = s.output.split(/\r?\n/);
    } else {
      lines = (await (await fetch("/api/logs?lines=200")).json()).lines;
      if (s.output) {
        lines = lines.concat(
          ["", `--- last manual sync (${s.ok === false ? "FAILED" : "ok"}) ---`],
          s.output.split(/\r?\n/));
      }
    }
    el.textContent = lines.join("\n");
    if (stick) el.scrollTop = el.scrollHeight;
  } catch (e) { /* transient */ }
}

// live countdowns
setInterval(() => {
  document.querySelectorAll(".cd[data-expires]").forEach(el => {
    const exp = parseFloat(el.dataset.expires);
    if (exp - Date.now() / 1000 <= 0) {
      // Expired: the next daemon pass (≤5 min) locks the group — say so
      // instead of freezing at 0:00:00 (renders directly on later passes).
      const bar = el.closest(".gracebar");
      if (bar) bar.textContent = t("grace_ended");
      return;
    }
    el.textContent = fmtCountdown(exp);
  });
}, 1000);

applyTheme();    // set data-theme first so the initial paint uses the right palette
setLang(lang);   // apply static labels + <html lang> on first paint
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
