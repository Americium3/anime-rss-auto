<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anime Autopilot</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0c11;
    --panel: rgba(255,255,255,.035);
    --panel-border: rgba(255,255,255,.08);
    --text: #e7eaf0;
    --text-dim: #8b93a3;
    --text-faint: #5b6272;
    --accent-a: #8b5cf6;
    --accent-b: #22d3ee;
    --ok: #34d399;
    --warn: #fbbf24;
    --muted: #64748b;
    --media-bg: #141821;
    --input-bg: #12151d;
    --log-bg: #0d1017;
    --log-text: #9aa5b8;
    --toast-bg: #161a24;
    --btn-text: #0b0d12;
    --hover-border: rgba(255,255,255,.16);
    --scroll-thumb: rgba(255,255,255,.16);
    --glow-a: rgba(139,92,246,.14);
    --glow-b: rgba(34,211,238,.10);
    --mono: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --radius: 18px;
  }
  html[data-theme="light"] {
    color-scheme: light;
    --bg: #eef1f7;
    --panel: rgba(255,255,255,.65);
    --panel-border: rgba(13,23,40,.10);
    --text: #16202e;
    --text-dim: #526074;
    --text-faint: #7e8a9c;
    --accent-a: #7c3aed;
    --accent-b: #0891b2;
    --ok: #059669;
    --warn: #b45309;
    --media-bg: #dfe5ee;
    --input-bg: #ffffff;
    --log-bg: #e9edf4;
    --log-text: #45536a;
    --toast-bg: #ffffff;
    --btn-text: #ffffff;
    --hover-border: rgba(13,23,40,.25);
    --scroll-thumb: rgba(13,23,40,.22);
    --glow-a: rgba(124,58,237,.10);
    --glow-b: rgba(8,145,178,.08);
  }
  html[data-theme="light"] .sched-col.today {
    background: rgba(8,145,178,.06); border-color: rgba(8,145,178,.30);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      radial-gradient(900px 500px at 85% -10%, var(--glow-a), transparent 60%),
      radial-gradient(700px 400px at -5% 15%, var(--glow-b), transparent 60%);
    background-attachment: fixed;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }

  /* ---------- header ---------- */
  header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 26px; }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-right: auto; }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%; align-self: center;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow: 0 0 14px rgba(139,92,246,.8);
  }
  .brand h1 { font-size: 19px; font-weight: 650; letter-spacing: .12em; margin: 0; }
  .brand small { color: var(--text-faint); letter-spacing: .05em; font-size: 11.5px; }
  .chip {
    padding: 5px 12px; border-radius: 999px; font-size: 12px;
    border: 1px solid var(--panel-border); background: var(--panel); color: var(--text-dim);
    white-space: nowrap;
  }
  .chip b { color: var(--text); font-weight: 600; }
  .btn {
    appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
    color: var(--btn-text); padding: 8px 18px; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
    box-shadow: 0 4px 18px rgba(99,102,241,.35);
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(99,102,241,.5); }
  .btn:disabled { opacity: .55; cursor: default; transform: none; }
  .btn.ghost {
    background: var(--panel); color: var(--text-dim);
    border: 1px solid var(--panel-border); box-shadow: none; font-weight: 500;
  }
  .btn.ghost:hover { color: var(--text); }
  .btn.small { padding: 5px 12px; font-size: 12px; }
  .btn.lang { padding: 6px 13px; font-size: 12px; min-width: 46px; }

  /* ---------- show cards ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(8px);
    display: flex; transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .card { cursor: pointer; }
  .card:hover {
    border-color: color-mix(in srgb, var(--card-glow, var(--text-dim)) 60%, transparent);
    box-shadow: 0 0 20px color-mix(in srgb, var(--card-glow, var(--text-dim)) 25%, transparent);
    transform: translateY(-2px);
  }
  /* Hover glow tinted by the show's bgm collection type (cards + timetable). */
  .t-watching { --card-glow: var(--ok); }
  .t-want { --card-glow: var(--accent-b); }
  .t-done { --card-glow: var(--text-dim); }
  .t-onhold { --card-glow: var(--warn); }
  .t-dropped { --card-glow: #f87171; }
  html[data-theme="light"] .t-dropped { --card-glow: #dc2626; }
  .cover { width: 112px; min-width: 112px; background: var(--media-bg); position: relative; }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover .ph { position: absolute; inset: 0; display: grid; place-items: center; color: var(--text-faint); font-size: 24px; }
  .card-body { padding: 14px 16px; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .card h3 { margin: 0; font-size: 15px; font-weight: 640; line-height: 1.3; }
  .jp { color: var(--text-faint); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    padding: 3px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px;
  }
  .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.grace { color: var(--warn); background: rgba(251,191,36,.12); }
  .pill.unresolved { color: var(--text-dim); background: rgba(148,163,184,.12); }
  .pill.unresolved::before { animation: pulse 1.6s ease-in-out infinite; }
  .pill.manual { color: var(--muted); background: rgba(100,116,139,.12); }
  @keyframes pulse { 50% { opacity: .25; } }
  /* Season badge: 8 colors = 4 cours × 2 years, same cour same color,
     palette repeats every two years. */
  .season-tag {
    font-size: 11px; font-weight: 600; letter-spacing: .03em;
    padding: 2px 9px; border-radius: 999px; color: var(--text-faint);
    background: color-mix(in srgb, currentColor 14%, transparent);
  }
  .season-tag.s0 { color: #f472b6; }  /* even-year winter  */
  .season-tag.s1 { color: #fb923c; }  /* even-year spring  */
  .season-tag.s2 { color: #a3e635; }  /* even-year summer  */
  .season-tag.s3 { color: #22d3ee; }  /* even-year autumn  */
  .season-tag.s4 { color: #a78bfa; }  /* odd-year winter   */
  .season-tag.s5 { color: #facc15; }  /* odd-year spring   */
  .season-tag.s6 { color: #34d399; }  /* odd-year summer   */
  .season-tag.s7 { color: #60a5fa; }  /* odd-year autumn   */
  html[data-theme="light"] .season-tag.s0 { color: #db2777; }
  html[data-theme="light"] .season-tag.s1 { color: #ea580c; }
  html[data-theme="light"] .season-tag.s2 { color: #65a30d; }
  html[data-theme="light"] .season-tag.s3 { color: #0891b2; }
  html[data-theme="light"] .season-tag.s4 { color: #7c3aed; }
  html[data-theme="light"] .season-tag.s5 { color: #ca8a04; }
  html[data-theme="light"] .season-tag.s6 { color: #059669; }
  html[data-theme="light"] .season-tag.s7 { color: #2563eb; }

  .grouprow { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); flex-wrap: wrap; }
  .grouprow select {
    background: var(--input-bg); color: var(--text); border: 1px solid var(--panel-border);
    border-radius: 8px; padding: 4px 8px; font: inherit; font-size: 12px; max-width: 170px;
  }
  .gracebar { font-size: 12px; color: var(--warn); display: flex; align-items: center; gap: 10px; }
  .gracebar .cd { font-family: var(--mono); font-size: 12.5px; }

  .readyline { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .readyline.ok { color: var(--ok); }
  .empty-note { color: var(--text-faint); font-size: 12px; font-style: italic; }

  /* ---------- sections ---------- */
  .section-h {
    display: flex; align-items: center; gap: 12px; margin: 34px 0 14px;
    color: var(--text-dim); font-size: 12px; letter-spacing: .16em; text-transform: uppercase;
  }
  .section-h::after { content: ""; flex: 1; height: 1px; background: var(--panel-border); }

  .prio { display: flex; gap: 8px; flex-wrap: wrap; }
  .prio .chip b { margin-right: 6px; color: var(--accent-b); font-family: var(--mono); }

  .logs {
    background: var(--log-bg); border: 1px solid var(--panel-border); border-radius: var(--radius);
    font-family: var(--mono); font-size: 11.5px; color: var(--log-text);
    padding: 14px 16px; max-height: 320px; overflow-y: auto; white-space: pre-wrap;
    display: none;
  }
  .logs.open { display: block; }

  /* ---------- premiere notifications ---------- */
  .premieres { display: flex; flex-direction: column; gap: 12px; }
  .premieres:not(:empty) { margin-bottom: 26px; }
  .premiere {
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(135deg, rgba(139,92,246,.16), rgba(34,211,238,.10));
    border: 1px solid rgba(139,92,246,.35); border-radius: var(--radius);
    padding: 12px 16px; backdrop-filter: blur(8px);
    animation: slidein .35s ease;
  }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } }
  .premiere .pcover { width: 44px; min-width: 44px; height: 60px; border-radius: 8px; overflow: hidden; background: var(--media-bg); position: relative; }
  .premiere .pcover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .premiere .pcover .ph { position: absolute; inset: 0; display: grid; place-items: center; color: var(--text-faint); font-size: 18px; }
  .premiere .pbody { flex: 1; min-width: 0; }
  .premiere .ptitle { font-weight: 640; font-size: 14.5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .premiere .ptag { color: var(--accent-b); font-weight: 700; letter-spacing: .04em; }
  .premiere .psub { color: var(--text-dim); font-size: 12px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .premiere .pbadge {
    font-size: 10.5px; font-weight: 600; letter-spacing: .04em; color: var(--ok);
    background: rgba(52,211,153,.14); padding: 2px 9px; border-radius: 999px;
  }

  /* ---------- collection filter bar + type pills ---------- */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin: 2px 0 18px; }
  .fchip {
    appearance: none; cursor: pointer; font: inherit; font-size: 12.5px;
    padding: 6px 14px; border-radius: 999px; color: var(--text-dim);
    border: 1px solid var(--panel-border); background: var(--panel);
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .fchip:hover { color: var(--text); border-color: var(--hover-border); }
  .fchip b { color: var(--text); font-family: var(--mono); margin-left: 6px; font-weight: 600; }
  .fchip.active { color: var(--btn-text); background: linear-gradient(135deg, var(--accent-a), var(--accent-b)); border-color: transparent; }
  .fchip.active b { color: var(--btn-text); }
  .pill.watching { color: var(--ok); background: rgba(52,211,153,.12); }
  .pill.want { color: var(--accent-b); background: rgba(34,211,238,.12); }
  .airline { font-size: 12px; color: var(--accent-b); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .airline .ai { opacity: .7; }

  /* ---------- weekly timetable: one vertical column per weekday ---------- */
  #cards.schedule { display: block; }
  .sched-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .sched-board {
    display: flex; align-items: flex-start; gap: 12px;
    overflow-x: auto; padding-bottom: 14px;
    scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) transparent;
  }
  .sched-board::-webkit-scrollbar { height: 8px; }
  .sched-board::-webkit-scrollbar-track { background: transparent; }
  .sched-board::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 8px; }
  .pill.aired { color: var(--ok); background: rgba(52,211,153,.12); }
  .pill.upcoming { color: var(--warn); background: rgba(251,191,36,.12); }
  .sched-col {
    flex: 0 0 226px; min-width: 226px; max-width: 226px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .sched-day {
    display: flex; align-items: center; gap: 8px; margin: 2px 0 4px;
    color: var(--text-dim); font-size: 12px; letter-spacing: .16em; text-transform: uppercase;
  }
  .sched-day::after { content: ""; flex: 1; height: 1px; background: var(--panel-border); }
  .sched-col.today {
    background: rgba(34,211,238,.055);
    border: 1px solid rgba(34,211,238,.28);
    border-radius: var(--radius);
    padding: 10px;
    box-shadow: 0 0 18px rgba(34,211,238,.10);
  }
  .sched-col.today .sched-day { color: var(--accent-b); }
  .sched-col.today .sched-day::after { background: rgba(34,211,238,.35); }
  .sched-day .today-badge {
    font-size: 10.5px; font-weight: 600; letter-spacing: .04em; color: var(--accent-b);
    background: rgba(34,211,238,.12); padding: 2px 9px; border-radius: 999px; text-transform: none;
  }
  .sched-empty { color: var(--text-faint); font-size: 12px; font-style: italic; padding: 4px 2px; }
  .sched-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 14px; padding: 10px; backdrop-filter: blur(8px);
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .sched-item { cursor: pointer; }
  .sched-item:hover {
    border-color: color-mix(in srgb, var(--card-glow, var(--text-dim)) 60%, transparent);
    box-shadow: 0 0 14px color-mix(in srgb, var(--card-glow, var(--text-dim)) 22%, transparent);
  }
  .srow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
  .stime { font-family: var(--mono); color: var(--accent-b); font-size: 12.5px; }
  .scover { width: 34px; min-width: 34px; height: 46px; border-radius: 6px; overflow: hidden; background: var(--media-bg); position: relative; }
  .scover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scover .ph { position: absolute; inset: 0; display: grid; place-items: center; color: var(--text-faint); font-size: 15px; }
  .sbody { flex: 1; min-width: 0; }
  .stitle {
    font-weight: 640; font-size: 13px; line-height: 1.3; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .sbody .jp { margin-top: 2px; }

  /* ---------- toast ---------- */
  #toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--toast-bg); border: 1px solid var(--panel-border); color: var(--text);
    padding: 10px 20px; border-radius: 12px; font-size: 13px; opacity: 0;
    transition: opacity .25s ease, transform .25s ease; pointer-events: none; max-width: 80vw;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  html[data-theme="light"] #toast { box-shadow: 0 10px 30px rgba(13,23,40,.18); }

  .spin { display: inline-block; animation: rot 1s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="dot"></span>
      <h1>ANIME&nbsp;AUTOPILOT</h1>
      <small>bangumi · mikan · qBittorrent · jellyfin</small>
    </div>
    <span class="chip"><span data-i18n="season">Season</span> <b id="season">—</b></span>
    <span class="chip"><span data-i18n="lastSync">Last sync</span> <b id="lastsync">—</b></span>
    <button class="btn ghost lang" id="themebtn" onclick="cycleTheme()">◐</button>
    <button class="btn ghost lang" id="langbtn" onclick="toggleLang()">中文</button>
    <button class="btn" id="syncbtn" onclick="runSync()">Sync now</button>
  </header>

  <div class="premieres" id="premieres"></div>

  <div class="filters" id="filters"></div>

  <div class="grid" id="cards"></div>

  <div class="section-h" data-i18n="subgroupPriority">Subgroup priority</div>
  <div class="prio" id="prio"></div>

  <div class="section-h">
    <span data-i18n="daemonLog">Daemon log</span>
    <button class="btn ghost small" id="logbtn" onclick="toggleLogs()">Show</button>
  </div>
  <div class="logs" id="logs"></div>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// i18n: every user-facing string lives here; the code renders through t().
// Language auto-detects from the browser, is toggleable, and persists.
// ---------------------------------------------------------------------------
const I18N = {
  en: {
    langBtn: "中文",
    season: "Season", lastSync: "Last sync", syncNow: "Sync now", syncing: "Syncing…",
    subgroupPriority: "Subgroup priority", daemonLog: "Daemon log", show: "Show", hide: "Hide",
    st_grace: "ANi grace", st_unresolved: "Awaiting mikan", st_manual: "Manual (legacy)",
    via: "via", switch: "Switch", waitingAni: "Waiting for ANi", lockBest: "Lock best now",
    noEpisodes: "Subscribed — no episodes in feed yet",
    notOnMikan: "Not on mikan yet — checked every 5 min",
    epReady: o => `${o.done}/${o.total} episodes ready to watch`,
    graceH: h => `grace ${h}h`,
    backendUnreachable: e => "Backend unreachable: " + e,
    syncFinished: "Sync pass finished",
    syncFailStart: e => "Sync failed to start: " + e,
    openDropdown: "Open the dropdown first to load groups",
    loadGroupsFail: e => "Could not load subgroups: " + e,
    switchFail: e => "Switch failed: " + e,
    failed: e => "Failed: " + e,
    already_running: "Sync already running",
    grace_ended: "Grace ended — next sync (≤5 min) locks the best available group",
    switched: g => `Rule now follows ${g}`,
    premiered: "PREMIERED",
    nowWatching: "Marked as watching",
    gotIt: "Got it",
    t_watching: "Watching", t_want: "Plan to watch",
    t_done: "Completed", t_onhold: "On hold", t_dropped: "Dropped",
    airsLabel: "Airs",
    theme_auto: "◐ Auto", theme_dark: "● Dark", theme_light: "○ Light",
    t_schedule: "Timetable",
    days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
    timeTBA: "Time TBA", today: "Today",
    scheduleEmpty: "No airing-time data yet — it fills in as AniList lookups resolve",
    sched_all: "All", sched_aired: "Airing", sched_upcoming: "Upcoming",
  },
  zh: {
    langBtn: "EN",
    season: "季度", lastSync: "上次同步", syncNow: "立即同步", syncing: "同步中…",
    subgroupPriority: "字幕组优先级", daemonLog: "守护进程日志", show: "展开", hide: "收起",
    st_grace: "ANi 宽限期", st_unresolved: "等待 mikan", st_manual: "手动（旧番）",
    via: "字幕组", switch: "切换", waitingAni: "等待 ANi", lockBest: "锁定当前最优",
    noEpisodes: "已订阅 — feed 中暂无剧集",
    notOnMikan: "mikan 上尚未出现 — 每 5 分钟检查一次",
    epReady: o => `${o.done}/${o.total} 集准备完成，可以观看`,
    graceH: h => `宽限 ${h} 小时`,
    backendUnreachable: e => "后端无法连接：" + e,
    syncFinished: "本轮同步完成",
    syncFailStart: e => "同步启动失败：" + e,
    openDropdown: "请先展开下拉菜单以加载字幕组",
    loadGroupsFail: e => "字幕组加载失败：" + e,
    switchFail: e => "切换失败：" + e,
    failed: e => "操作失败：" + e,
    already_running: "同步已在进行中",
    grace_ended: "宽限期已结束 — 下轮同步（≤5 分钟）将锁定当前最优字幕组",
    switched: g => `规则已切换到 ${g}`,
    premiered: "已开播",
    nowWatching: "已自动标为在看",
    gotIt: "知道了",
    t_watching: "在看", t_want: "想看",
    t_done: "看过", t_onhold: "搁置", t_dropped: "抛弃",
    airsLabel: "开播",
    theme_auto: "◐ 跟随系统", theme_dark: "● 深色", theme_light: "○ 浅色",
    t_schedule: "时刻表",
    days: ["周一", "周二", "周三", "周四", "周五", "周六", "周日"],
    timeTBA: "时间待定", today: "今天",
    scheduleEmpty: "暂无开播时间数据 — AniList 查询完成后会自动补齐",
    sched_all: "全部", sched_aired: "已开播", sched_upcoming: "未开播",
  },
};

let lang = localStorage.getItem("lang") ||
  ((navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en");
let state = null;
let collections = null;
let activeType = "watching";
let schedFilter = "all";   // timetable premiere-status filter: all | aired | upcoming
let logsOpen = false;
let logsTimer = null;

const FILTER_ORDER = ["watching", "want", "done", "onhold", "dropped"];

// Local-timezone premiere string; falls back to the bgm date when AniList has no time.
function fmtLocal(airingAt, premiereDate) {
  if (airingAt) {
    const loc = lang === "zh" ? "zh-CN" : "en-US";
    return new Date(airingAt * 1000).toLocaleString(loc,
      { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short", hour: "2-digit", minute: "2-digit" });
  }
  return premiereDate || "";
}

const $ = id => document.getElementById(id);
const esc = s => (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Card titles follow the UI language: English/romaji (from AniList, when known)
// in English mode, the bgm Chinese title otherwise. The original name renders
// as a sub-line only when it differs from the main title.
const displayTitle = s => lang === "en" ? (s.title_en || s.title_jp || s.title) : (s.title || s.title_jp);
const jpLine = s => {
  const main = displayTitle(s);
  return s.title_jp && s.title_jp !== main ? `<div class="jp">${esc(s.title_jp)}</div>` : "";
};

function t(key, arg) {
  const v = (I18N[lang] || I18N.en)[key];
  return typeof v === "function" ? v(arg) : (v == null ? key : v);
}

function setLang(l) {
  lang = l;
  document.documentElement.lang = (l === "zh" ? "zh-CN" : "en");
  applyStatic();
  render();
  if (state) refreshPremieres();
}
// Only an explicit toggle pins the language; plain visits keep following the browser.
function toggleLang() {
  const l = lang === "zh" ? "en" : "zh";
  localStorage.setItem("lang", l);
  setLang(l);
}

// Theme: auto (follow the OS, default) → dark → light, persisted.
let themeMode = localStorage.getItem("theme") || "auto";
const themeMedia = window.matchMedia("(prefers-color-scheme: light)");
function applyTheme() {
  const eff = themeMode === "auto" ? (themeMedia.matches ? "light" : "dark") : themeMode;
  document.documentElement.dataset.theme = eff;
}
function cycleTheme() {
  themeMode = themeMode === "auto" ? "dark" : themeMode === "dark" ? "light" : "auto";
  localStorage.setItem("theme", themeMode);
  applyTheme();
  applyStatic();
}
themeMedia.addEventListener("change", () => { if (themeMode === "auto") applyTheme(); });

function applyStatic() {
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  $("langbtn").textContent = t("langBtn");
  $("themebtn").textContent = t("theme_" + themeMode);
  $("logbtn").textContent = logsOpen ? t("hide") : t("show");
  const btn = $("syncbtn");
  if (!btn._busy && !(state && state.sync_running)) btn.textContent = t("syncNow");
}

function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._h);
  el._h = setTimeout(() => el.classList.remove("show"), 3500);
}

const STATUS_KEY = {
  grace: "st_grace", unresolved: "st_unresolved", manual: "st_manual",
};

// "YYYY.MM" → s0..s7: 4 cours × 2 years, so the palette repeats every 2 years.
function seasonClass(season) {
  const m = /^(\d{4})\.(\d{2})$/.exec(season || "");
  if (!m) return "";
  const q = { "01": 0, "04": 1, "07": 2, "10": 3 }[m[2]] ?? 0;
  return "s" + ((+m[1] % 2) * 4 + q);
}

// Card click → the show's bangumi subject page. Ignores clicks on the card's
// own controls (switch button, subgroup dropdown, etc.) so they keep working.
function openBgm(e, bgmId) {
  if (e.target.closest("button, select, a")) return;
  window.open("https://bgm.tv/subject/" + bgmId, "_blank", "noopener");
}

function fmtCountdown(expires) {
  const s = Math.max(0, Math.floor(expires - Date.now() / 1000));
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), ss = s % 60;
  return `${h}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

function card(show) {
  const st = show.status;
  // "subscribed" is the normal state — only exceptional statuses get a pill.
  const pill = STATUS_KEY[st] ? `<span class="pill ${st}">${t(STATUS_KEY[st])}</span>` : "";
  const cover = show.image
    ? `<img src="${esc(show.image)}" loading="lazy" alt="">`
    : `<div class="ph">◌</div>`;

  let groupRow = "";
  if (show.rule && show.rule.mikan_id) {
    groupRow = `
      <div class="grouprow">
        <span>${t("via")} <b style="color:var(--text)">${esc(show.rule.subgroup_name || "?")}</b></span>
        <select id="sel-${show.bgm_id}" data-loaded="0"
                onfocus="loadSubgroups(${show.bgm_id}, ${show.rule.mikan_id}, ${show.rule.subgroup})">
          <option>${esc(show.rule.subgroup_name || "…")}</option>
        </select>
        <button class="btn ghost small" onclick="switchGroup(${show.bgm_id})">${t("switch")}</button>
      </div>`;
  } else if (show.rule) {
    // Rule without a mikan feed: nothing to switch, show the group read-only.
    groupRow = `<div class="grouprow"><span>${t("via")} <b style="color:var(--text)">${esc(show.rule.subgroup_name || "?")}</b></span></div>`;
  }

  let graceRow = "";
  if (st === "grace" && show.grace) {
    graceRow = `
      <div class="gracebar">
        <span>${t("waitingAni")}</span>
        <span class="cd" data-expires="${show.grace.expires}">${fmtCountdown(show.grace.expires)}</span>
        <button class="btn ghost small" onclick="endGrace(${show.bgm_id})">${t("lockBest")}</button>
      </div>`;
  }

  // Episode summary instead of per-torrent rows: "done/total ready to watch".
  let torrents = "";
  if (show.torrents.length) {
    const done = show.torrents.filter(tr => tr.progress >= 1).length;
    torrents = `<div class="readyline ${done ? "ok" : ""}">▸ ${t("epReady", { done, total: show.torrents.length })}</div>`;
  } else if (st === "subscribed") {
    torrents = `<div class="empty-note">${t("noEpisodes")}</div>`;
  } else if (st === "unresolved") {
    torrents = `<div class="empty-note">${t("notOnMikan")}</div>`;
  }

  const seasonTag = show.season ? `<span class="season-tag ${seasonClass(show.season)}">${esc(show.season)}</span>` : "";
  const meta = pill || seasonTag ? `<div class="meta">${pill}${seasonTag}</div>` : "";
  return `<div class="card t-watching" onclick="openBgm(event, ${show.bgm_id})">
    <div class="cover">${cover}</div>
    <div class="card-body">
      ${meta}
      <h3>${esc(displayTitle(show))}</h3>
      ${jpLine(show)}
      ${groupRow}${graceRow}${torrents}
    </div>
  </div>`;
}

// Compact card for non-在看 collection types (no rule/torrent enrichment).
function basicCard(s) {
  const cover = s.image
    ? `<img src="${esc(s.image)}" loading="lazy" alt="">`
    : `<div class="ph">◌</div>`;
  const when = fmtLocal(s.airing_at, s.premiere_date);
  const airRow = when ? `<div class="airline"><span class="ai">▸</span>${t("airsLabel")} ${esc(when)}</div>` : "";
  const meta = s.season ? `<div class="meta"><span class="season-tag ${seasonClass(s.season)}">${esc(s.season)}</span></div>` : "";
  return `<div class="card t-${s.type}" onclick="openBgm(event, ${s.bgm_id})">
    <div class="cover">${cover}</div>
    <div class="card-body">
      ${meta}
      <h3>${esc(displayTitle(s))}</h3>
      ${jpLine(s)}
      ${airRow}
    </div>
  </div>`;
}

function renderFilters() {
  if (!collections) return;
  const c = collections.counts || {};
  const visible = FILTER_ORDER.filter(k => (c[k] || 0) > 0);
  // The active tab can vanish (its count drops to 0) — retarget instead of
  // leaving a blank grid with no chip highlighted.
  if (activeType !== "schedule" && !visible.includes(activeType)) activeType = visible[0] || "schedule";
  const chips = visible.map(k =>
    `<button class="fchip ${activeType === k ? "active" : ""}" onclick="setFilter('${k}')">${t("t_" + k)}<b>${c[k]}</b></button>`
  );
  chips.push(`<button class="fchip ${activeType === "schedule" ? "active" : ""}" onclick="setFilter('schedule')">${t("t_schedule")}</button>`);
  $("filters").innerHTML = chips.join("");
}

function setFilter(k) {
  activeType = k;
  renderFilters();
  renderCards();
}

// Sort key: precise AniList timestamp, else the bgm premiere date; unknown last.
function airMs(s) {
  if (s.airing_at) return s.airing_at * 1000;
  const p = Date.parse(s.premiere_date || s.date || "");
  return Number.isNaN(p) ? Infinity : p;
}
const byAir = (a, b) => airMs(a) - airMs(b);

function renderCards() {
  $("cards").classList.toggle("schedule", activeType === "schedule");
  if (activeType === "schedule") {
    renderSchedule();
  } else if (activeType === "watching") {
    if (!state) return;
    $("cards").innerHTML = state.shows.slice().sort(byAir).map(card).join("") || `<div class="sched-empty">—</div>`;
  } else if (collections) {
    const list = collections.groups[activeType] || [];
    $("cards").innerHTML = list.slice().sort(byAir).map(basicCard).join("") || `<div class="sched-empty">—</div>`;
  }
}

// Premiere status: episode 1's timestamp (or the bgm date) is in the past.
const hasAired = s => airMs(s) <= Date.now();

// Weekly timetable: watching + plan-to-watch shows, one vertical column per
// weekday. Columns start at today and wrap around the week; each column is
// sorted by local time of day. A sub-filter narrows the board by premiere
// status, and the board scrolls horizontally when it doesn't fit.
function renderSchedule() {
  if (!collections) { $("cards").innerHTML = ""; return; }
  const all = ["watching", "want"].flatMap(k => collections.groups[k] || []);
  if (!all.length) {
    $("cards").innerHTML = `<div class="sched-empty">${t("scheduleEmpty")}</div>`;
    return;
  }
  const counts = {
    all: all.length,
    aired: all.filter(hasAired).length,
    upcoming: all.filter(s => !hasAired(s)).length,
  };
  const chips = ["all", "aired", "upcoming"].map(k =>
    `<button class="fchip ${schedFilter === k ? "active" : ""}" onclick="setSchedFilter('${k}')">${t("sched_" + k)}<b>${counts[k]}</b></button>`
  ).join("");

  const shows = schedFilter === "all" ? all : all.filter(s => hasAired(s) === (schedFilter === "aired"));
  const days = [[], [], [], [], [], [], []];  // Mon..Sun
  const tba = [];
  for (const s of shows) {
    if (s.airing_at) days[(new Date(s.airing_at * 1000).getDay() + 6) % 7].push(s);
    else tba.push(s);
  }
  const minuteOf = s => { const d = new Date(s.airing_at * 1000); return d.getHours() * 60 + d.getMinutes(); };
  const today = (new Date().getDay() + 6) % 7;
  const names = t("days");
  const col = (name, isToday, list) => {
    const badge = isToday ? `<span class="today-badge">${t("today")}</span>` : "";
    const body = list.length ? list.map(schedItem).join("") : `<div class="sched-empty">—</div>`;
    return `<div class="sched-col ${isToday ? "today" : ""}">
      <div class="sched-day">${name}${badge}</div>${body}
    </div>`;
  };
  let board = "";
  for (let off = 0; off < 7; off++) {
    const i = (today + off) % 7;
    days[i].sort((a, b) => minuteOf(a) - minuteOf(b) || byAir(a, b));
    board += col(names[i], off === 0, days[i]);
  }
  if (tba.length) board += col(t("timeTBA"), false, tba.slice().sort(byAir));
  $("cards").innerHTML = `<div class="sched-filters">${chips}</div><div class="sched-board">${board}</div>`;
}

function setSchedFilter(k) {
  schedFilter = k;
  renderCards();
}

function schedItem(s) {
  const d = s.airing_at ? new Date(s.airing_at * 1000) : null;
  const hm = d ? `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}` : "--:--";
  const cover = s.image
    ? `<img src="${esc(s.image)}" loading="lazy" alt="">`
    : `<div class="ph">◌</div>`;
  const aired = hasAired(s);
  // The aired/upcoming pill would repeat the active sub-filter — only on "all".
  const statusPill = schedFilter === "all"
    ? `<span class="pill ${aired ? "aired" : "upcoming"}">${t(aired ? "sched_aired" : "sched_upcoming")}</span>` : "";
  const pills = `<span class="pill ${s.type}">${t("t_" + s.type)}</span>` + statusPill;
  const title = displayTitle(s);
  return `<div class="sched-item t-${s.type}" onclick="openBgm(event, ${s.bgm_id})">
    <div class="scover">${cover}</div>
    <div class="sbody">
      <div class="srow"><span class="stime">${hm}</span>${pills}</div>
      <div class="stitle" title="${esc(title)}">${esc(title)}</div>
      ${jpLine(s)}
    </div>
  </div>`;
}

function render() {
  if (!state) return;
  $("season").textContent = state.season;
  $("lastsync").textContent = state.last_sync ? state.last_sync.slice(5) : "—";
  renderFilters();
  renderCards();
  $("prio").innerHTML = state.group_priority
    .map((g, i) => `<span class="chip"><b>#${i + 1}</b>${esc(g.name)}</span>`)
    .join("") + `<span class="chip">${t("graceH", state.grace_hours)}</span>`;
  const btn = $("syncbtn");
  if (state.sync_running) { btn.disabled = true; btn.innerHTML = `<span class="spin">◌</span>&nbsp;${t("syncing")}`; }
  else if (!btn._busy) { btn.disabled = false; btn.textContent = t("syncNow"); }
}

async function refresh() {
  try {
    state = await (await fetch("/api/overview")).json();
    render();
    refreshPremieres();
    refreshCollections();
  } catch (e) {
    toast(t("backendUnreachable", e.message));
    // First load with the backend down: leave a persistent hint, not just a
    // 3.5s toast over a blank page. The 30s poll keeps retrying.
    if (!state) $("cards").innerHTML = `<div class="sched-empty">${esc(t("backendUnreachable", e.message))}</div>`;
  }
}

async function refreshCollections() {
  try {
    collections = await (await fetch("/api/collections")).json();
    renderFilters();   // may retarget activeType if its tab vanished
    renderCards();
  } catch (e) { /* transient */ }
}

async function refreshPremieres() {
  try {
    const d = await (await fetch("/api/notifications")).json();
    // A premiere banner stays on the dashboard for a week after detection,
    // unless the user dismisses it earlier.
    const WEEK_MS = 7 * 86400 * 1000;
    const unread = d.notifications.filter(n => {
      if (n.read) return false;
      const ts = Date.parse(n.detected_at || "");
      return Number.isNaN(ts) || Date.now() - ts < WEEK_MS;
    });
    $("premieres").innerHTML = unread.map(n => {
      const cover = n.image ? `<img src="${esc(n.image)}" loading="lazy" alt="">` : `<div class="ph">◌</div>`;
      const badge = n.promoted ? `<span class="pbadge">${t("nowWatching")}</span>` : "";
      const when = (n.detected_at || "").slice(5, 16).replace("T", " ");
      // Notifications store the title at detection time — prefer the live
      // collections entry so the banner follows the UI language too.
      const src = (collections && FILTER_ORDER.flatMap(k => collections.groups[k] || [])
        .find(x => x.bgm_id === n.bgm_id)) || n;
      const title = displayTitle(src);
      const sub = [n.title_jp !== title ? esc(n.title_jp) : "", esc(n.subgroup_name || ""), when]
        .filter(Boolean).join(" · ");
      return `<div class="premiere" onclick="openBgm(event, ${n.bgm_id})">
        <div class="pcover">${cover}</div>
        <div class="pbody">
          <div class="ptitle">🎬 <span class="ptag">${t("premiered")}</span>${esc(title)}${badge}</div>
          <div class="psub">${sub}</div>
        </div>
        <button class="btn ghost small" onclick="dismissPremiere(${n.bgm_id})">${t("gotIt")}</button>
      </div>`;
    }).join("");
  } catch (e) { /* transient */ }
}

async function dismissPremiere(bgmId) {
  try {
    await fetch("/api/notifications/read", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ bgm_id: bgmId }),
    });
    refreshPremieres();
  } catch (e) { /* transient */ }
}

async function runSync() {
  const btn = $("syncbtn");
  btn._busy = true; btn.disabled = true; btn.innerHTML = `<span class="spin">◌</span>&nbsp;${t("syncing")}`;
  try {
    const r = await (await fetch("/api/sync", { method: "POST" })).json();
    if (!r.started) { toast(t(r.code || "already_running")); }
    let misses = 0;
    const poll = setInterval(async () => {
      try {
        const s = await (await fetch("/api/sync/status")).json();
        misses = 0;
        if (!s.running) {
          clearInterval(poll);
          btn._busy = false;
          toast(t("syncFinished"));
          refresh();
        }
      } catch (e) {
        // Give a restarting backend ~15s before releasing the button —
        // otherwise it sticks on "Syncing…" forever.
        if (++misses >= 10) {
          clearInterval(poll);
          btn._busy = false; btn.disabled = false; btn.textContent = t("syncNow");
          toast(t("backendUnreachable", e.message));
        }
      }
    }, 1500);
  } catch (e) {
    btn._busy = false; btn.disabled = false; btn.textContent = t("syncNow");
    toast(t("syncFailStart", e.message));
  }
}

async function endGrace(bgmId) {
  try {
    const r = await fetch("/api/grace/expire", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ bgm_id: bgmId }),
    });
    const d = await r.json();
    toast(r.ok ? t(d.code || "grace_ended") : t("failed", d.detail || r.status));
    if (r.ok) refresh();
  } catch (e) { toast(t("failed", e.message)); }
}

async function loadSubgroups(bgmId, mikanId, currentGid) {
  const sel = $("sel-" + bgmId);
  if (!sel || sel.dataset.loaded === "1") return;
  sel.dataset.loaded = "1";
  try {
    const d = await (await fetch("/api/subgroups/" + mikanId)).json();
    sel.innerHTML = d.subgroups
      .map(g => `<option value="${g.id}" ${g.id === currentGid ? "selected" : ""}>${esc(g.name)}</option>`)
      .join("");
  } catch (e) {
    sel.dataset.loaded = "0";
    toast(t("loadGroupsFail", e.message));
  }
}

// The rule name is looked up from state by bgm_id instead of being inlined
// into onclick — titles can contain quotes/backslashes that break the handler.
async function switchGroup(bgmId) {
  const sel = $("sel-" + bgmId);
  if (!sel || sel.dataset.loaded !== "1") { toast(t("openDropdown")); return; }
  const show = ((state && state.shows) || []).find(x => x.bgm_id === bgmId);
  if (!show || !show.rule) return;
  const gid = parseInt(sel.value, 10);
  try {
    const r = await fetch("/api/rule/switch", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rule_name: show.rule.name, subgroup: gid }),
    });
    const d = await r.json();
    toast(r.ok ? t(d.code || "switched", d.group) : t("switchFail", d.detail || r.status));
    if (r.ok) refresh();
  } catch (e) { toast(t("switchFail", e.message)); }
}

function toggleLogs() {
  logsOpen = !logsOpen;
  $("logs").classList.toggle("open", logsOpen);
  $("logbtn").textContent = logsOpen ? t("hide") : t("show");
  if (logsOpen) { pullLogs(); logsTimer = setInterval(pullLogs, 5000); }
  else clearInterval(logsTimer);
}

async function pullLogs() {
  try {
    const el = $("logs");
    const stick = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;
    // While a manual sync runs, show its live output — the daemon log never
    // sees manual passes.
    const s = await (await fetch("/api/sync/status")).json();
    let lines;
    if (s.running && s.output) lines = s.output.split(/\r?\n/);
    else lines = (await (await fetch("/api/logs?lines=200")).json()).lines;
    el.textContent = lines.join("\n");
    if (stick) el.scrollTop = el.scrollHeight;
  } catch (e) { /* transient */ }
}

// live countdowns
setInterval(() => {
  document.querySelectorAll(".cd[data-expires]").forEach(el => {
    const exp = parseFloat(el.dataset.expires);
    if (exp - Date.now() / 1000 <= 0) {
      // Expired: the next daemon pass (≤5 min) locks the group — say so
      // instead of freezing at 0:00:00.
      const bar = el.closest(".gracebar");
      if (bar) bar.textContent = t("grace_ended");
      return;
    }
    el.textContent = fmtCountdown(exp);
  });
}, 1000);

applyTheme();    // set data-theme first so the initial paint uses the right palette
setLang(lang);   // apply static labels + <html lang> on first paint
refresh();
setInterval(refresh, 30000);
</script>
</body>
